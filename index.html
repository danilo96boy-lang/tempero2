    // --- FUNÇÕES ESSENCIAIS (Adicionei a atualização do carrinho) ---
    window.atualizarInterfaceCarrinho = function() {
        const lista = document.getElementById('lista-itens');
        const totalSpan = document.getElementById('total-valor');
        if (!lista) return;
        lista.innerHTML = pedidoAtual.map(i => `
            <li class="item-carrinho">
                <span>${i.qtd}x ${i.prato} [${i.tipo}]</span>
                <span>R$ ${i.valor.toFixed(2)}</span>
                <button class="btn-del" onclick="window.removerItem(${i.id})">×</button>
            </li>`).join('');
        const total = pedidoAtual.reduce((acc, cur) => acc + cur.valor, 0);
        totalSpan.innerText = total.toFixed(2);
        document.getElementById('badge-contador-id').style.display = pedidoAtual.length > 0 ? 'block' : 'none';
        document.getElementById('badge-contador-id').innerText = pedidoAtual.length;
    };

    // --- EXPOSIÇÃO GLOBAL DE TODAS AS FUNÇÕES USADAS NO HTML ---
    window.validarAcessoSecure = function(event) {
        event.preventDefault();

    window.adicionarItem = function(event) {
        event.preventDefault();
        const precoUnitario = parseFloat(document.getElementById('valor').value);
        const qtd = parseInt(document.getElementById('quantidade').value);
        
        pedidoAtual.push({
            id: Date.now(),
            prato: pratoSelecionadoGlobal,
            tipo: tipoSelecionadoGlobal,
            descricao: document.getElementById('descricao').value.trim(),
            qtd: qtd,
            valor: precoUnitario * qtd
        });

        window.atualizarInterfaceCarrinho();
        document.getElementById('form-item').reset();
        window.alternarAbaMobile('carrinho');
    };

    window.removerItem = function(id) {
        pedidoAtual = pedidoAtual.filter(i => i.id !== id);
        window.atualizarInterfaceCarrinho();
    };
